name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    name: Tests (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --coverage --coverageReporters=text-summary

  migrate:
    name: Apply DB migrations
    runs-on: ubuntu-latest
    needs: test                          # espera que los tests pasen
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Apply pending migrations via management API
        # Usa la Supabase management API (HTTPS) — no requiere conexión directa a la DB.
        # El host db.*.supabase.co es IPv6-only en us-east-1; la API es IPv4.
        # Las migraciones son idempotentes (IF NOT EXISTS / CREATE OR REPLACE).
        run: |
          set -e
          PROJECT_REF="${{ vars.SUPABASE_PROJECT_REF }}"
          API_URL="https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query"

          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "==> Aplicando $(basename $f)..."
            SQL=$(python3 -c "
          import json, sys
          sql = open(sys.argv[1]).read()
          print(json.dumps({'query': sql}))
          " "$f")

            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "$API_URL" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "$SQL")

            echo "  HTTP $HTTP_STATUS"
            if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "201" ]; then
              echo "  Error:"
              cat /tmp/response.json
              exit 1
            fi
          done
          echo "Migraciones aplicadas correctamente."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
