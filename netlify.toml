[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Carrito abandonado: corre cada 2 horas
[functions."abandoned-cart"]
  schedule = "0 */2 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Canonical redirect: /index.html → /
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# Custom 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
