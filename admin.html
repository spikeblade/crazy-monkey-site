<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — CRAZY MONKEY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="robots" content="noindex, nofollow">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#080808;--deep:#0d0d0d;--red:#b01a1a;--cream:#d9cdb8;--gold:#c8a84b;--light:#8a8a8a;--white:#f0ebe0;--green:#2a6a2a}
body{background:var(--black);color:var(--cream);font-family:'Space Mono',monospace;min-height:100vh}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;padding:2rem}
.login-logo{font-family:'Cinzel Decorative',serif;font-size:2rem;color:var(--white)}
.login-logo span{color:var(--red)}
.login-sub{font-size:.55rem;letter-spacing:.4em;color:var(--light);text-transform:uppercase}
.login-form{display:flex;flex-direction:column;gap:.8rem;width:100%;max-width:320px}
.login-input{background:#111;border:1px solid #2a2a2a;border-bottom:1px solid var(--red);color:var(--cream);font-family:'Space Mono',monospace;font-size:.8rem;padding:.8rem 1rem;outline:none;width:100%}
.login-input:focus{border-color:var(--cream)}
.login-btn{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.3em;color:var(--black);background:var(--red);border:none;padding:.8rem;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:background .2s}
.login-btn:hover{background:var(--cream)}
.login-error{font-size:.6rem;color:var(--red);text-align:center;min-height:1rem}

/* ADMIN PANEL */
#adminPanel{display:none;padding:2rem}
.admin-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1a1a1a;padding-bottom:1.5rem;margin-bottom:2rem;flex-wrap:gap}
.admin-logo{font-family:'Cinzel Decorative',serif;font-size:1.4rem;color:var(--white)}
.admin-logo span{color:var(--red)}
.admin-title{font-size:.55rem;letter-spacing:.4em;color:var(--light);text-transform:uppercase;margin-top:.2rem}
.admin-actions{display:flex;gap:.8rem;align-items:center;flex-wrap:wrap}
.refresh-btn{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.2em;color:var(--light);background:none;border:1px solid #2a2a2a;padding:.5rem 1rem;cursor:pointer;text-transform:uppercase;transition:border-color .2s,color .2s}
.refresh-btn:hover{border-color:var(--red);color:var(--cream)}
.logout-btn{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.2em;color:#444;background:none;border:none;cursor:pointer;text-transform:uppercase;text-decoration:underline;text-underline-offset:3px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--deep);border:1px solid #1e1e1e;padding:1.2rem;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.05em;color:var(--white)}
.stat-label{font-size:.5rem;letter-spacing:.3em;color:var(--light);text-transform:uppercase;margin-top:.2rem}

/* FILTERS */
.filter-row{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-btn{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.2em;color:var(--light);background:none;border:1px solid #1e1e1e;padding:.4rem .9rem;cursor:pointer;text-transform:uppercase;transition:all .2s}
.filter-btn.active,.filter-btn:hover{border-color:var(--red);color:var(--cream)}

/* ORDERS TABLE */
.orders-wrap{overflow-x:auto}
.orders-table{width:100%;border-collapse:collapse;font-size:.65rem;min-width:700px}
.orders-table th{font-size:.5rem;letter-spacing:.3em;color:var(--red);text-transform:uppercase;padding:.8rem 1rem;border-bottom:1px solid #1e1e1e;text-align:left;white-space:nowrap}
.orders-table td{padding:.9rem 1rem;border-bottom:1px solid #111;vertical-align:top;color:var(--cream)}
.orders-table tr:hover td{background:rgba(255,255,255,.02)}

.order-name{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.08em;color:var(--white)}
.order-tel{font-size:.55rem;color:var(--light);margin-top:.15rem}
.order-location{font-size:.6rem;color:var(--light)}
.order-items-list{display:flex;flex-direction:column;gap:.2rem}
.order-item-line{font-size:.58rem;color:var(--cream)}
.order-item-line span{color:var(--red);margin-left:.3rem}
.order-total{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--gold);white-space:nowrap}
.order-date{font-size:.55rem;color:var(--light);white-space:nowrap}

/* STATUS BADGE */
.status-select{font-family:'Space Mono',monospace;font-size:.5rem;letter-spacing:.15em;background:#111;border:1px solid #2a2a2a;color:var(--cream);padding:.3rem .5rem;cursor:pointer;text-transform:uppercase;-webkit-appearance:none;appearance:none;width:100%;transition:border-color .2s}
.status-select:focus{outline:none;border-color:var(--red)}
.status-select option{background:#111}

.estado-pendiente{color:var(--gold)}
.estado-confirmado{color:#4a9a4a}
.estado-enviado{color:#4a7aaa}
.estado-entregado{color:var(--light)}

.wa-btn{display:inline-block;font-size:.5rem;letter-spacing:.15em;color:#2a8a2a;background:none;border:1px solid #1a3a1a;padding:.3rem .6rem;cursor:pointer;text-transform:uppercase;text-decoration:none;transition:border-color .2s,color .2s;white-space:nowrap}
.wa-btn:hover{border-color:#2a8a2a;color:#4aaa4a}

.empty-state{text-align:center;padding:4rem 2rem;color:#333;font-size:.65rem;letter-spacing:.2em}
.loading{text-align:center;padding:3rem;color:#444;font-size:.6rem;letter-spacing:.3em}

@media(max-width:600px){
  #adminPanel{padding:1rem}
  .admin-header{flex-direction:column;align-items:flex-start;gap:1rem}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}

.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;margin-top:1rem}
.prod-card{background:var(--deep);border:1px solid #1e1e1e;padding:1.2rem;position:relative;transition:border-color .2s}
.prod-card.inactive{opacity:.45}
.prod-card:hover{border-color:#2a2a2a}
.prod-card-img{width:100%;aspect-ratio:16/9;object-fit:cover;filter:saturate(.8);margin-bottom:.8rem}
.prod-card-name{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.08em;color:var(--white);margin-bottom:.2rem;line-height:1.2}
.prod-card-col{font-size:.5rem;letter-spacing:.3em;color:var(--red);text-transform:uppercase;margin-bottom:.6rem}
.prod-card-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.8rem;padding-top:.8rem;border-top:1px solid #1a1a1a}
.prod-action-btn{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.15em;background:none;border:1px solid #2a2a2a;color:var(--light);padding:.35rem .7rem;cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap}
.prod-action-btn:hover{border-color:var(--cream);color:var(--cream)}
.prod-action-btn.danger:hover{border-color:var(--red);color:var(--red)}
.prod-action-btn.toggle-on{border-color:#2a6a2a;color:#4a9a4a}
.prod-action-btn.toggle-off{border-color:#555;color:#555}
.prod-status{position:absolute;top:.8rem;right:.8rem;font-size:.45rem;letter-spacing:.2em;padding:.2rem .6rem;border-radius:2px;text-transform:uppercase}
.prod-status.active{background:rgba(74,154,74,.15);color:#4a9a4a}
.prod-status.inactive{background:rgba(85,85,85,.15);color:#555}
.new-prod-btn{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.25em;color:var(--black);background:var(--red);border:none;padding:.65rem 1.5rem;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:background .2s;margin-bottom:1.5rem}
.new-prod-btn:hover{background:var(--cream)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50000;align-items:center;justify-content:center;padding:2rem}
.modal-overlay.open{display:flex}
.modal-box{background:#0d0d0d;border:1px solid #2a2a2a;border-top:3px solid var(--red);padding:2rem;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.15em;color:var(--white);margin-bottom:1.5rem}
.modal-field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem}
.modal-field label{font-size:.48rem;letter-spacing:.35em;color:var(--light);text-transform:uppercase}
.modal-field input,.modal-field textarea,.modal-field select{background:#111;border:1px solid #2a2a2a;border-bottom:1px solid var(--red);color:var(--cream);font-family:'Space Mono',monospace;font-size:.7rem;padding:.6rem .9rem;outline:none;resize:none;width:100%}
.modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus{border-color:var(--cream)}
.modal-field select option{background:#111}
.modal-actions{display:flex;gap:.8rem;margin-top:1.2rem;flex-wrap:wrap}
.modal-save{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.25em;color:var(--black);background:var(--red);border:none;padding:.65rem 1.5rem;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:background .2s}
.modal-save:hover{background:var(--cream)}
.modal-cancel{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.2em;background:none;border:1px solid #2a2a2a;color:var(--light);padding:.65rem 1.2rem;cursor:pointer;text-transform:uppercase;transition:all .2s}
.modal-cancel:hover{border-color:var(--cream);color:var(--cream)}
.modal-msg{font-size:.6rem;margin-top:.6rem;min-height:1rem}
.modal-msg.error{color:var(--red-bright)}
.modal-msg.success{color:#4a9a4a}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div>
    <p class="login-logo">Crazy<span>M</span>onkey</p>
    <p class="login-sub" style="text-align:center;margin-top:.4rem">Panel de pedidos</p>
  </div>
  <div class="login-form">
    <input class="login-input" type="password" id="passInput" placeholder="Contraseña"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar →</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-header">
    <div>
      <p class="admin-logo">Crazy<span>M</span>onkey</p>
      <p class="admin-title">✦ Panel de pedidos</p>
    </div>
    <div class="admin-actions">
      <button class="refresh-btn" onclick="loadOrders()">↻ Actualizar</button>
      <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <p class="stat-num" id="statTotal">—</p>
      <p class="stat-label">Pedidos totales</p>
    </div>
    <div class="stat-card">
      <p class="stat-num" id="statPendientes">—</p>
      <p class="stat-label">Pendientes</p>
    </div>
    <div class="stat-card">
      <p class="stat-num" id="statEnviados">—</p>
      <p class="stat-label">Enviados</p>
    </div>
    <div class="stat-card">
      <p class="stat-num" id="statRevenue">—</p>
      <p class="stat-label">Total COP</p>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('pendiente', this)">Pendientes</button>
    <button class="filter-btn" onclick="setFilter('confirmado', this)">Confirmados</button>
    <button class="filter-btn" onclick="setFilter('enviado', this)">Enviados</button>
    <button class="filter-btn" onclick="setFilter('entregado', this)">Entregados</button>
    <button class="filter-btn" onclick="showReviews(this)" style="margin-left:auto;border-color:#2a4a2a;color:#4a7a4a">★ Reseñas</button>
    <button class="filter-btn" onclick="showProductos(this)" style="border-color:#2a2a4a;color:#4a4a9a">▤ Productos</button>
  </div>

  <!-- Table -->
  <div class="orders-wrap">
    <table class="orders-table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Destino</th>
          <th>Productos</th>
          <th>Total</th>
          <th>Fecha</th>
          <th>Estado</th>
          <th>WA</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="7" class="loading">Cargando pedidos...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Reviews panel -->
<div id="reviewsPanel" style="display:none;margin-top:1.5rem">
  <div class="orders-wrap">
    <table class="orders-table">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Usuario</th>
          <th>Puntuación</th>
          <th>Reseña</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="reviewsAdminBody">
        <tr><td colspan="5" class="loading">Cargando reseñas...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Productos panel -->
<div id="productosPanel" style="display:none;margin-top:1rem">
  <button class="new-prod-btn" onclick="openProductoModal(null)">+ Agregar producto</button>
  <div class="prod-grid" id="prodGrid">
    <p style="font-size:.6rem;color:#444;letter-spacing:.2em">Cargando productos...</p>
  </div>
</div>

<!-- Modal edición producto -->
<div class="modal-overlay" id="prodModal">
  <div class="modal-box">
    <p class="modal-title" id="modalTitle">Nuevo Producto</p>
    <input type="hidden" id="modalId">
    <div class="modal-field">
      <label>Nombre *</label>
      <input type="text" id="mNombre" placeholder="Nombre del diseño">
    </div>
    <div class="modal-field">
      <label>Colección *</label>
      <select id="mColeccion">
        <option>Collection Noir</option>
        <option>Gothic Fantasy</option>
        <option>Anti-Establishment</option>
        <option>Literario</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Categoría (para filtros) *</label>
      <select id="mCategoria">
        <option value="noir">noir</option>
        <option value="gothic">gothic</option>
        <option value="punk">punk</option>
        <option value="literary">literary</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Descripción *</label>
      <textarea id="mDescripcion" rows="3" placeholder="Descripción del diseño..."></textarea>
    </div>
    <div class="modal-field">
      <label>Imagen (ruta relativa) *</label>
      <input type="text" id="mImagen" placeholder="imgs/shirt_25.png">
    </div>
    <div class="modal-field">
      <label>Precio (COP)</label>
      <input type="number" id="mPrecio" value="95000" min="0">
    </div>
    <div class="modal-field">
      <label>Orden en catálogo</label>
      <input type="number" id="mOrden" value="99" min="1">
    </div>
    <div class="modal-field" style="flex-direction:row;align-items:center;gap:.8rem">
      <input type="checkbox" id="mActivo" checked style="width:auto;border:none">
      <label for="mActivo" style="font-size:.6rem;text-transform:none;letter-spacing:.1em;cursor:pointer">Producto activo (visible en tienda)</label>
    </div>
    <p class="modal-msg" id="modalMsg"></p>
    <div class="modal-actions">
      <button class="modal-save" onclick="saveProducto()">Guardar →</button>
      <button class="modal-cancel" onclick="closeProdModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
let adminPassword = '';
let allOrders = [];
let currentFilter = 'todos';

// ── LOGIN ──
function doLogin() {
  const pass = document.getElementById('passInput').value;
  if (!pass) return;
  adminPassword = pass;
  loadOrders();
}

function doLogout() {
  adminPassword = '';
  allOrders = [];
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('passInput').value = '';
}

// ── LOAD ORDERS ──
async function loadOrders() {
  try {
    const res = await fetch('/.netlify/functions/get-orders', {
      headers: { 'x-admin-password': adminPassword }
    });

    if (res.status === 401) {
      document.getElementById('loginError').textContent = '✕ Contraseña incorrecta.';
      adminPassword = '';
      return;
    }

    if (!res.ok) throw new Error('Server error');

    allOrders = await res.json();

    // Show panel
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';

    updateStats();
    renderOrders();

  } catch (err) {
    document.getElementById('loginError').textContent = '✕ Error de conexión. Intenta de nuevo.';
  }
}

// ── STATS ──
function updateStats() {
  document.getElementById('statTotal').textContent = allOrders.length;
  document.getElementById('statPendientes').textContent =
    allOrders.filter(o => o.estado === 'pendiente' || o.estado === 'confirmado').length;
  document.getElementById('statEnviados').textContent =
    allOrders.filter(o => o.estado === 'enviado').length;
  const revenue = allOrders
    .filter(o => o.estado !== 'pendiente')
    .reduce((s, o) => s + (o.total || 0), 0);
  document.getElementById('statRevenue').textContent =
    '$' + revenue.toLocaleString('es-CO');
}

// ── RENDER ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const filtered = currentFilter === 'todos'
    ? allOrders
    : allOrders.filter(o => o.estado === currentFilter);

  const tbody = document.getElementById('ordersBody');

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No hay pedidos en esta categoría</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(order => {
    const date = new Date(order.created_at);
    const dateStr = date.toLocaleDateString('es-CO', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = date.toLocaleTimeString('es-CO', { hour:'2-digit', minute:'2-digit' });

    const items = Array.isArray(order.items) ? order.items : [];
    const itemsHtml = items.map(i =>
      `<p class="order-item-line">${i.name}<span>T.${i.size}</span></p>`
    ).join('');

    const waMsg = encodeURIComponent(
      `Hola ${order.nombre}! Tu pedido de Crazy Monkey está en camino 🖤\n` +
      `Productos: ${items.map(i => `${i.name} T.${i.size}`).join(', ')}\n` +
      `Total: $${(order.total||0).toLocaleString('es-CO')} COP`
    );
    const waTel = (order.telefono || '').replace(/\D/g, '');

    return `
      <tr>
        <td>
          <p class="order-name">${order.nombre || '—'}</p>
          <p class="order-tel">${order.telefono || '—'}</p>
        </td>
        <td>
          <p class="order-location">${order.ciudad || '—'}</p>
          <p class="order-location">${order.departamento || '—'}</p>
        </td>
        <td><div class="order-items-list">${itemsHtml || '—'}</div></td>
        <td class="order-total">$${(order.total||0).toLocaleString('es-CO')}</td>
        <td class="order-date">${dateStr}<br>${timeStr}</td>
        <td>
          <select class="status-select estado-${order.estado}"
            onchange="updateEstado('${order.id}', this.value, this)">
            <option value="pendiente" ${order.estado==='pendiente'?'selected':''}>Pendiente</option>
            <option value="confirmado" ${order.estado==='confirmado'?'selected':''}>Confirmado</option>
            <option value="enviado" ${order.estado==='enviado'?'selected':''}>Enviado</option>
            <option value="entregado" ${order.estado==='entregado'?'selected':''}>Entregado</option>
          </select>
        </td>
        <td>
          ${waTel ? `<a class="wa-btn" href="https://wa.me/57${waTel}?text=${waMsg}" target="_blank">WA →</a>` : '—'}
        </td>
      </tr>
    `;
  }).join('');
}

// ── UPDATE ESTADO ──
async function updateEstado(id, estado, selectEl) {
  selectEl.className = `status-select estado-${estado}`;
  try {
    const res = await fetch('/.netlify/functions/get-orders', {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': adminPassword,
      },
      body: JSON.stringify({ id, estado }),
    });
    if (!res.ok) throw new Error();
    // Update local data
    const order = allOrders.find(o => o.id === id);
    if (order) order.estado = estado;
    updateStats();
  } catch {
    alert('Error actualizando estado. Recarga la página.');
  }
}

// Auto-refresh cada 2 minutos si está logueado
setInterval(() => { if (adminPassword) loadOrders(); }, 120000);
// ── PRODUCTOS ADMIN ──
let allProductos = [];
let editingId = null;

function showProductos(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelector('.orders-wrap').style.display = 'none';
  document.getElementById('reviewsPanel').style.display = 'none';
  document.getElementById('productosPanel').style.display = 'block';
  loadProductosAdmin();
}

// Override showReviews and setFilter to hide productosPanel
const _origShowReviews = showReviews;
function showReviews(btn) {
  document.getElementById('productosPanel').style.display = 'none';
  _origShowReviews(btn);
}

async function loadProductosAdmin() {
  const grid = document.getElementById('prodGrid');
  try {
    const res = await fetch('/.netlify/functions/productos', {
      headers: { 'x-admin-password': adminPassword }
    });
    allProductos = await res.json();

    if (!allProductos.length) {
      grid.innerHTML = '<p style="font-size:.6rem;color:#444;letter-spacing:.2em">No hay productos.</p>';
      return;
    }

    grid.innerHTML = allProductos.map(p => `
      <div class="prod-card ${p.activo ? '' : 'inactive'}" id="prodcard-${p.id}">
        <span class="prod-status ${p.activo ? 'active' : 'inactive'}">${p.activo ? 'Activo' : 'Inactivo'}</span>
        <img class="prod-card-img" src="${p.imagen}" alt="${p.nombre}"
          onerror="this.style.background='#1a1a1a';this.style.minHeight='80px'">
        <p class="prod-card-col">${p.coleccion}</p>
        <p class="prod-card-name">${p.nombre}</p>
        <div class="prod-card-actions">
          <button class="prod-action-btn" onclick="openProductoModal('${p.id}')">✎ Editar</button>
          <button class="prod-action-btn ${p.activo ? 'toggle-on' : 'toggle-off'}"
            onclick="toggleProducto('${p.id}', ${!p.activo})">
            ${p.activo ? '● Activo' : '○ Inactivo'}
          </button>
          <button class="prod-action-btn danger" onclick="deleteProducto('${p.id}', '${p.nombre.replace(/'/g,"\'") }')">✕ Eliminar</button>
        </div>
      </div>
    `).join('');

  } catch(e) {
    grid.innerHTML = '<p style="font-size:.6rem;color:var(--red)">Error cargando productos.</p>';
  }
}

async function toggleProducto(id, nuevoEstado) {
  await fetch('/.netlify/functions/productos', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
    body: JSON.stringify({ id, activo: nuevoEstado }),
  });
  loadProductosAdmin();
}

async function deleteProducto(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"? Esta acción no se puede deshacer.`)) return;
  await fetch(`/.netlify/functions/productos?id=${id}`, {
    method: 'DELETE',
    headers: { 'x-admin-password': adminPassword },
  });
  loadProductosAdmin();
}

function openProductoModal(id) {
  editingId = id;
  const msgEl = document.getElementById('modalMsg');
  msgEl.textContent = '';
  msgEl.className = 'modal-msg';

  if (id) {
    const p = allProductos.find(p => p.id === id);
    if (!p) return;
    document.getElementById('modalTitle').textContent = 'Editar Producto';
    document.getElementById('modalId').value = p.id;
    document.getElementById('mNombre').value = p.nombre;
    document.getElementById('mColeccion').value = p.coleccion;
    document.getElementById('mCategoria').value = p.categoria;
    document.getElementById('mDescripcion').value = p.descripcion;
    document.getElementById('mImagen').value = p.imagen;
    document.getElementById('mPrecio').value = p.precio;
    document.getElementById('mOrden').value = p.orden;
    document.getElementById('mActivo').checked = p.activo;
  } else {
    document.getElementById('modalTitle').textContent = 'Nuevo Producto';
    document.getElementById('modalId').value = '';
    document.getElementById('mNombre').value = '';
    document.getElementById('mDescripcion').value = '';
    document.getElementById('mImagen').value = '';
    document.getElementById('mPrecio').value = '95000';
    document.getElementById('mOrden').value = '99';
    document.getElementById('mActivo').checked = true;
  }

  document.getElementById('prodModal').classList.add('open');
}

function closeProdModal() {
  document.getElementById('prodModal').classList.remove('open');
  editingId = null;
}

async function saveProducto() {
  const msgEl = document.getElementById('modalMsg');
  msgEl.textContent = '';

  const nombre = document.getElementById('mNombre').value.trim();
  const descripcion = document.getElementById('mDescripcion').value.trim();
  const imagen = document.getElementById('mImagen').value.trim();

  if (!nombre || !descripcion || !imagen) {
    msgEl.textContent = '✕ Nombre, descripción e imagen son obligatorios.';
    msgEl.className = 'modal-msg error';
    return;
  }

  const data = {
    nombre,
    coleccion: document.getElementById('mColeccion').value,
    categoria: document.getElementById('mCategoria').value,
    descripcion,
    imagen,
    precio: parseInt(document.getElementById('mPrecio').value) || 95000,
    orden: parseInt(document.getElementById('mOrden').value) || 99,
    activo: document.getElementById('mActivo').checked,
  };

  if (editingId) data.id = editingId;

  const res = await fetch('/.netlify/functions/productos', {
    method: editingId ? 'PATCH' : 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
    body: JSON.stringify(data),
  });

  const result = await res.json();

  if (!res.ok || !result.success) {
    msgEl.textContent = `✕ ${result.error || 'Error guardando producto.'}`;
    msgEl.className = 'modal-msg error';
    return;
  }

  msgEl.textContent = '✔ Guardado correctamente.';
  msgEl.className = 'modal-msg success';
  setTimeout(() => { closeProdModal(); loadProductosAdmin(); }, 800);
}

// Close modal on overlay click
document.getElementById('prodModal').addEventListener('click', function(e) {
  if (e.target === this) closeProdModal();
});
